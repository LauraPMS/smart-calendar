<!DOCTYPE html>
<html lang="fr" class="h-full bg-slate-900 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration DSI - Astreintes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // SÉCURITÉ : Redirection si non connecté ou si ce n'est pas un Admin
        const sessionName = localStorage.getItem('session_name');
        const sessionRole = localStorage.getItem('session_role');
        if (!sessionName || sessionRole !== 'Admin') { 
            window.location.replace('/login.html'); 
        }
    </script>
</head>
<body class="h-full flex flex-col font-sans">

    <!-- Navbar -->
    <header class="flex items-center justify-between border-b border-slate-800 bg-slate-950 px-6 py-4">
        <h1 class="text-xl font-bold tracking-tight text-indigo-400">Administration Globale DSI</h1>
        <div class="flex items-center gap-4">
            <span class="text-sm text-slate-400">Connecté en tant que : <strong class="text-slate-200" id="display-name">...</strong></span>
            <a href="#" onclick="logout(); return false;" class="text-sm text-rose-400 hover:text-rose-300 transition underline decoration-rose-400/30 underline-offset-4 ml-4">Déconnexion</a>
        </div>
    </header>

    <main class="flex-1 p-8 overflow-y-auto max-w-6xl mx-auto w-full grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <!-- COLONNE GAUCHE : GESTION DES SERVICES -->
        <div class="space-y-6">
            <div class="bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-sm">
                <h2 class="text-lg font-bold text-slate-100 mb-4 border-b border-slate-800 pb-2">Créer un nouveau Service</h2>
                <form id="form-create-service" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Nom complet du service</label>
                        <input type="text" id="svc-name" placeholder="ex: Cybersécurité CSIT" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-200 focus:outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Tag (Identifiant court)</label>
                        <input type="text" id="svc-tag" placeholder="ex: SSI" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-200 focus:outline-none focus:border-indigo-500 uppercase">
                    </div>
                    <div id="msg-service" class="text-sm font-medium hidden"></div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2 rounded-lg transition shadow-md mt-2">Ajouter le Service</button>
                </form>
            </div>

            <!-- Liste des services existants -->
            <div class="bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-sm">
                <h2 class="text-lg font-bold text-slate-100 mb-4 border-b border-slate-800 pb-2">Services Actifs</h2>
                <div id="services-list" class="space-y-2 max-h-64 overflow-y-auto pr-2">
                    <p class="text-sm text-slate-500 italic">Chargement...</p>
                </div>
            </div>
        </div>

        <!-- COLONNE DROITE : GESTION DES COMPTES -->
        <div class="bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-sm h-fit">
            <h2 class="text-lg font-bold text-slate-100 mb-4 border-b border-slate-800 pb-2">Créer un Compte Collaborateur</h2>
            <form id="form-create-user" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Nom complet</label>
                    <input type="text" id="user-name" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-200 focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Email</label>
                    <input type="email" id="user-email" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-200 focus:outline-none focus:border-emerald-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Rôle</label>
                        <select id="user-role" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-200 focus:outline-none focus:border-emerald-500">
                            <option value="User">Utilisateur</option>
                            <option value="Manager">Manager</option>
                            <option value="Admin">Administrateur Global</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Service d'affectation</label>
                        <select id="user-service" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-200 focus:outline-none focus:border-emerald-500">
                            <option value="">-- Aucun (Admin) --</option>
                            <!-- Rempli dynamiquement par JS -->
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Mot de passe provisoire</label>
                    <input type="password" id="user-password" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-200 focus:outline-none focus:border-emerald-500">
                </div>

                <div id="msg-user" class="text-sm font-medium hidden"></div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-2 rounded-lg transition shadow-md mt-4">Créer le profil</button>
            </form>
        </div>

    </main>

    <script>
        document.getElementById('display-name').innerText = sessionName;

        function logout() { 
            localStorage.clear(); 
            window.location.href = '/login.html'; 
        }

        // --- CHARGEMENT DES SERVICES ---
        async function loadServices() {
            try {
                const response = await fetch('/api/admin/services');
                if (response.ok) {
                    const services = await response.json();
                    
                    // Mise à jour de la liste visuelle
                    const listDiv = document.getElementById('services-list');
                    if (services.length === 0) {
                        listDiv.innerHTML = '<p class="text-sm text-slate-500 italic">Aucun service créé.</p>';
                    } else {
                        listDiv.innerHTML = services.map(s => `
                            <div class="flex items-center justify-between bg-slate-900 p-3 rounded-lg border border-slate-800">
                                <span class="font-medium text-slate-200">${s.name}</span>
                                <span class="text-xs font-bold bg-indigo-500/20 text-indigo-400 px-2 py-1 rounded border border-indigo-500/30">${s.tag}</span>
                            </div>
                        `).join('');
                    }

                    // Mise à jour du menu déroulant (pour affecter un User à un Service)
                    const selectService = document.getElementById('user-service');
                    selectService.innerHTML = '<option value="">-- Aucun (DSI Globale) --</option>' + 
                        services.map(s => `<option value="${s.service_id}">${s.name} ${s.tag}</option>`).join('');
                }
            } catch (err) {
                console.error("Erreur chargement services:", err);
            }
        }

        // --- CREATION SERVICE ---
        document.getElementById('form-create-service').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('svc-name').value.trim(),
                tag: document.getElementById('svc-tag').value.trim()
            };
            const msg = document.getElementById('msg-service');
            msg.className = "text-sm font-medium text-slate-400 mt-2 block"; msg.innerText = "Création...";

            try {
                const res = await fetch('/api/admin/services', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                if (res.ok) {
                    msg.className = "text-sm font-medium text-emerald-400 mt-2 block"; msg.innerText = "Service ajouté !";
                    document.getElementById('form-create-service').reset();
                    loadServices(); // Rafraîchit la liste et le menu déroulant
                } else {
                    msg.className = "text-sm font-medium text-rose-400 mt-2 block"; msg.innerText = await res.text();
                }
            } catch (err) { msg.className = "text-sm font-medium text-rose-400 mt-2 block"; msg.innerText = "Erreur serveur."; }
        });

        // --- CREATION UTILISATEUR ---
        document.getElementById('form-create-user').addEventListener('submit', async (e) => {
            e.preventDefault();
            const serviceVal = document.getElementById('user-service').value;
            
            const payload = {
                name: document.getElementById('user-name').value.trim(),
                email: document.getElementById('user-email').value.trim(),
                role: document.getElementById('user-role').value,
                service_id: serviceVal ? parseInt(serviceVal) : null,
                password_temp: document.getElementById('user-password').value.trim()
            };
            
            const msg = document.getElementById('msg-user');
            msg.className = "text-sm font-medium text-slate-400 mt-2 block"; msg.innerText = "Génération du compte et du TAG...";

            try {
                const res = await fetch('/api/admin/users', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                if (res.ok) {
                    msg.className = "text-sm font-medium text-emerald-400 mt-2 block"; msg.innerText = "Compte généré avec succès !";
                    document.getElementById('form-create-user').reset();
                } else {
                    msg.className = "text-sm font-medium text-rose-400 mt-2 block"; msg.innerText = await res.text();
                }
            } catch (err) { msg.className = "text-sm font-medium text-rose-400 mt-2 block"; msg.innerText = "Erreur serveur."; }
        });

        // Init
        loadServices();
    </script>
</body>
</html>
