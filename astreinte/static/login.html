<!DOCTYPE html>
<html lang="fr" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Astreintes DSI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center font-sans">
    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl shadow-xl p-8">
        <div class="mb-8 text-center">
            <h2 class="text-2xl font-bold text-slate-100">Astreintes DSI</h2>
            <p class="text-sm text-slate-400 mt-2">Connectez-vous à votre espace</p>
        </div>

        <form id="form-login" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">Email professionnel</label>
                <input type="email" id="email" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">Mot de passe</label>
                <input type="password" id="password" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
            </div>

            <div id="login-msg" class="text-sm font-medium hidden text-center mt-4"></div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-lg transition shadow-md shadow-indigo-500/20 mt-6">
                Se connecter
            </button>
        </form>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const msgDiv = document.getElementById('login-msg');
            
            msgDiv.classList.remove('hidden');
            msgDiv.className = "text-sm font-medium text-slate-400 text-center mt-4";
            msgDiv.innerText = "Authentification...";

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    if (data.must_change_password) {
                        localStorage.setItem('temp_email', email);
                        localStorage.setItem('temp_password', password);
                        window.location.href = '/change-password.html';
                        return;
                    }

                    // Stockage des nouvelles données de session (dont le tag et le service)
                    localStorage.setItem('session_name', data.name);
                    localStorage.setItem('session_role', data.role);
                    localStorage.setItem('session_email', data.email);
                    localStorage.setItem('session_tag', data.user_tag);
                    localStorage.setItem('session_userId', data.user_id)
                    if (data.service_id) {
                        localStorage.setItem('session_service', data.service_id);
                    }

                    msgDiv.className = "text-sm font-medium text-emerald-400 text-center mt-4";
                    msgDiv.innerText = "Connexion réussie !";
                    
                    // ROUTAGE INTELLIGENT
                    setTimeout(() => {
                        if (data.role === 'Admin') window.location.replace('/admin.html');
                        else if (data.role === 'Manager') window.location.replace('/manager.html');
                        else window.location.replace('/user.html');
                    }, 500);

                } else {
                    msgDiv.className = "text-sm font-medium text-rose-400 text-center mt-4";
                    msgDiv.innerText = "Identifiants incorrects";
                }
            } catch (error) {
                msgDiv.className = "text-sm font-medium text-rose-400 text-center mt-4";
                msgDiv.innerText = "Erreur de connexion au serveur";
            }
        });
    </script>
</body>
</html>
