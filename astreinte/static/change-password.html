<!DOCTYPE html>
<html lang="fr" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe - Astreintes SSI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center font-sans px-4">

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold tracking-tight text-indigo-400 mb-1">Sécurisation du compte</h1>
            <p class="text-sm text-slate-400">Veuillez définir votre mot de passe définitif</p>
        </div>

        <form id="change-pwd-form" class="space-y-6">
            <div>
                <label for="new-password" class="block text-sm font-medium text-slate-300 mb-2">Nouveau mot de passe</label>
                <input type="password" id="new-password" required minlength="8" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
            </div>

            <div>
                <label for="confirm-password" class="block text-sm font-medium text-slate-300 mb-2">Confirmer le mot de passe</label>
                <input type="password" id="confirm-password" required minlength="8" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
            </div>

            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-2.5 rounded-lg shadow-sm transition mt-4">
                Valider et se connecter
            </button>
            
            <div id="msg-box" class="text-sm font-medium text-center hidden mt-4"></div>
        </form>
    </div>

    <script>
        // Récupération des données passées par la page de login
        const email = localStorage.getItem('temp_email');
        const old_password = localStorage.getItem('temp_password');

        // Si quelqu'un atterrit ici sans passer par le login, on le renvoie
        if (!email || !old_password) {
            window.location.href = '/login.html';
        }

        document.getElementById('change-pwd-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const new_password = document.getElementById('new-password').value;
            const confirm_password = document.getElementById('confirm-password').value;
            const msgDiv = document.getElementById('msg-box');
            
            if (new_password !== confirm_password) {
                msgDiv.classList.remove('hidden');
                msgDiv.className = "text-sm font-medium text-rose-400 text-center mt-4";
                msgDiv.innerText = "Les mots de passe ne correspondent pas.";
                return;
            }

            try {
                const response = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, old_password, new_password })
                });

                const resultText = await response.text();
                msgDiv.classList.remove('hidden');

                if (response.ok) {
                    msgDiv.className = "text-sm font-medium text-emerald-400 text-center mt-4";
                    msgDiv.innerText = "Mot de passe mis à jour ! Redirection...";
                    
                    // Nettoyage des données temporaires
                    localStorage.removeItem('temp_email');
                    localStorage.removeItem('temp_password');
                    
                    setTimeout(() => { window.location.href = '/index.html'; }, 1500);
                } else {
                    msgDiv.className = "text-sm font-medium text-rose-400 text-center mt-4";
                    msgDiv.innerText = resultText;
                }
            } catch (error) {
                console.error("Erreur :", error);
            }
        });
    </script>
</body>
</html>
