<!DOCTYPE html>
<html lang="fr" class="h-full bg-slate-900 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration DSI - Astreintes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        const sessionName = localStorage.getItem('session_name');
        const sessionRole = localStorage.getItem('session_role');
        if (!sessionName || sessionRole !== 'Admin') { window.location.replace('/login.html'); }
    </script>
</head>
<body class="h-full flex flex-col font-sans">

    <header class="flex items-center justify-between border-b border-slate-800 bg-slate-950 px-6 py-4">
        <h1 class="text-xl font-bold tracking-tight text-indigo-400">Administration Globale DSI</h1>
        <div class="flex items-center gap-4">
            <span class="text-sm text-slate-400">Connecté en tant que : <strong class="text-slate-200" id="display-name">...</strong></span>
            <a href="#" onclick="logout(); return false;" class="text-sm text-rose-400 hover:text-rose-300 underline ml-4">Déconnexion</a>
        </div>
    </header>

    <main class="flex-1 p-8 overflow-y-auto max-w-6xl mx-auto w-full grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <!-- SERVICES -->
        <div class="space-y-6">
            <div class="bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-sm">
                <h2 class="text-lg font-bold text-slate-100 mb-4 border-b border-slate-800 pb-2">Créer un nouveau Service</h2>
                <form id="form-create-service" class="space-y-4">
                    <div>
                        <input type="text" id="svc-name" placeholder="Nom du service (ex: Réseaux)" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-200 focus:outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <input type="text" id="svc-tag" placeholder="Tag court (ex: RES)" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-200 uppercase focus:outline-none focus:border-indigo-500">
                    </div>
                    <div id="msg-service" class="text-sm font-medium hidden"></div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2 rounded-lg transition shadow-md">Ajouter le Service</button>
                </form>
            </div>

            <div class="bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-sm">
                <h2 class="text-lg font-bold text-slate-100 mb-4 border-b border-slate-800 pb-2">Services Actifs</h2>
                <div id="services-list" class="space-y-2 max-h-48 overflow-y-auto pr-2">
                    <p class="text-sm text-slate-500 italic">Chargement...</p>
                </div>
            </div>
        </div>

        <!-- CRÉATION UTILISATEUR -->
        <div class="bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-sm h-fit">
            <h2 class="text-lg font-bold text-slate-100 mb-4 border-b border-slate-800 pb-2">Créer un Compte</h2>
            <form id="form-create-user" class="space-y-4">
                <input type="text" id="user-name" placeholder="Nom complet" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-200">
                <input type="email" id="user-email" placeholder="Email professionnel" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-200">
                
                <div class="grid grid-cols-2 gap-4">
                    <select id="user-role" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-200">
                        <option value="User">Utilisateur</option>
                        <option value="Manager">Manager</option>
                        <option value="Admin">Administrateur</option>
                    </select>
                    <select id="user-service" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-200">
                        <option value="">-- Aucun --</option>
                    </select>
                </div>
                
                <input type="password" id="user-password" placeholder="Mot de passe provisoire" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-slate-200">
                
                <div id="msg-user" class="text-sm font-medium hidden"></div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-2 rounded-lg transition shadow-md">Créer le profil</button>
            </form>
        </div>

        <!-- LISTE GLOBALE DES COMPTES -->
        <div class="col-span-1 md:col-span-2 bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-sm">
            <h2 class="text-lg font-bold text-slate-100 mb-4 border-b border-slate-800 pb-2">Gestion des Utilisateurs</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-800 text-sm text-slate-400">
                            <th class="py-3 px-4 font-medium">Tag</th>
                            <th class="py-3 px-4 font-medium">Nom</th>
                            <th class="py-3 px-4 font-medium">Email</th>
                            <th class="py-3 px-4 font-medium">Rôle</th>
                            <th class="py-3 px-4 font-medium">Service</th>
                            <th class="py-3 px-4 font-medium text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-list" class="text-sm">
                        <tr><td colspan="6" class="text-center text-slate-500 py-4 italic">Chargement...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('display-name').innerText = sessionName;
        const myUserId = parseInt(localStorage.getItem('session_userId'));

        function logout() { localStorage.clear(); window.location.href = '/login.html'; }

        // --- SERVICES ---
        async function loadServices() {
            try {
                const res = await fetch('/api/admin/services?t=' + Date.now());
                if (res.ok) {
                    const services = await res.json();
                    const listDiv = document.getElementById('services-list');
                    const selectSvc = document.getElementById('user-service');
                    
                    listDiv.innerHTML = services.length === 0 ? '<p class="text-sm text-slate-500">Aucun service.</p>' 
                        : services.map(s => `<div class="flex justify-between bg-slate-900 p-2 rounded border border-slate-800 mb-2"><span>${s.name}</span><span class="text-xs font-bold text-indigo-400">${s.tag}</span></div>`).join('');
                    
                    selectSvc.innerHTML = '<option value="">-- Aucun --</option>' + services.map(s => `<option value="${s.service_id}">${s.name}</option>`).join('');
                }
            } catch (e) {}
        }

        document.getElementById('form-create-service').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg-service');
            msg.className = "text-sm text-slate-400 block"; msg.innerText = "Création...";
            try {
                const res = await fetch('/api/admin/services', { 
                    method: 'POST', headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ name: document.getElementById('svc-name').value, tag: document.getElementById('svc-tag').value }) 
                });
                if (res.ok) { msg.className = "text-sm text-emerald-400 block"; msg.innerText = "Service ajouté !"; document.getElementById('form-create-service').reset(); loadServices(); }
            } catch (err) {}
        });

        // --- UTILISATEURS ---
        document.getElementById('user-role').addEventListener('change', (e) => {
            const svcSelect = document.getElementById('user-service');
            if (e.target.value === 'Admin') { svcSelect.value = ""; svcSelect.disabled = true; svcSelect.classList.add('opacity-50'); } 
            else { svcSelect.disabled = false; svcSelect.classList.remove('opacity-50'); }
        });

        document.getElementById('form-create-user').addEventListener('submit', async (e) => {
            e.preventDefault();
            const roleVal = document.getElementById('user-role').value;
            const serviceVal = document.getElementById('user-service').value;
            const msg = document.getElementById('msg-user');
            
            if (roleVal !== 'Admin' && !serviceVal) {
                msg.className = "text-sm text-amber-400 block"; msg.innerText = "Un service est obligatoire pour ce rôle."; return;
            }
            
            msg.className = "text-sm text-slate-400 block"; msg.innerText = "Création...";
            try {
                const res = await fetch('/api/admin/users', { 
                    method: 'POST', headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({
                        name: document.getElementById('user-name').value,
                        email: document.getElementById('user-email').value,
                        role: roleVal,
                        service_id: roleVal === 'Admin' ? null : parseInt(serviceVal),
                        password_temp: document.getElementById('user-password').value
                    }) 
                });
                
                if (res.ok) {
                    msg.className = "text-sm text-emerald-400 block"; msg.innerText = "Compte créé !";
                    document.getElementById('form-create-user').reset();
                    document.getElementById('user-service').disabled = false; document.getElementById('user-service').classList.remove('opacity-50');
                    loadUsers(); // Met à jour le tableau !
                } else { msg.className = "text-sm text-rose-400 block"; msg.innerText = await res.text(); }
            } catch (err) {}
        });

        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users?t=' + Date.now());                
                if (res.ok) {
                    const users = await res.json();
                    const tbody = document.getElementById('users-list');
                    
                    tbody.innerHTML = users.map(u => {
                        const initials = u.name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
                        const isMe = u.user_id === myUserId;
                        
                        // Badge de rôle coloré
                        const roleBadge = u.role === 'Admin' ? 'bg-amber-500/20 text-amber-400' : (u.role === 'Manager' ? 'bg-indigo-500/20 text-indigo-400' : 'bg-slate-800 text-slate-300');
                        
                        return `
                        <tr class="border-b border-slate-800/50 hover:bg-slate-900/50 transition">
                            <td class="py-3 px-4"><span class="text-[10px] font-bold text-slate-900 px-1.5 py-0.5 rounded" style="background-color: ${u.user_tag};">${initials}</span></td>
                            <td class="py-3 px-4 font-medium text-slate-200">${u.name}</td>
                            <td class="py-3 px-4 text-slate-400">${u.email}</td>
                            <td class="py-3 px-4"><span class="px-2 py-1 rounded text-xs font-bold ${roleBadge}">${u.role}</span></td>
                            <td class="py-3 px-4 text-slate-400">${u.service_name || '-'}</td>
                            <td class="py-3 px-4 text-right">
                                ${isMe ? `<span class="text-xs text-slate-500 italic pr-2">C'est vous</span>` 
                                       : `<button onclick="deleteUser(${u.user_id}, '${u.name}')" class="bg-rose-500/10 text-rose-400 border border-rose-500/20 hover:bg-rose-500/30 px-3 py-1.5 rounded transition font-medium text-xs">Supprimer</button>`}
                            </td>
                        </tr>`;
                    }).join('');
                }
            } catch(e) {}
        }

        async function deleteUser(id, name) {
            if (!confirm(`Êtes-vous sûr de vouloir supprimer définitivement ${name} ?`)) return;
            try {
                const res = await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
                if (res.ok) { loadUsers(); } 
                else { alert('Erreur lors de la suppression'); }
            } catch(e) { alert('Erreur serveur'); }
        }

        loadServices();
        loadUsers();
    </script>
</body>
</html>
