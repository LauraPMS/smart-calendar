<!DOCTYPE html>
<html lang="fr" class="bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirection - Astreintes DSI</title>
    <script>
        // Dès que la page commence à charger, on vérifie le rôle
        const role = localStorage.getItem('session_role');
        
        // Aiguillage instantané
        if (role === 'Admin') {
            window.location.replace('/admin.html');
        } else if (role === 'Manager') {
            window.location.replace('/manager.html');
        } else if (role === 'User') {
            window.location.replace('/user.html');
        } else {
            // Si pas de rôle ou non connecté, retour au login
            window.location.replace('/login.html');
        }
    </script>
</head>
<body>
    <!-- Écran d'attente (presque invisible car la redirection est instantanée) -->
    <div style="height: 100vh; display: flex; justify-content: center; align-items: center; color: #94a3b8; font-family: sans-serif;">
        Chargement de votre espace...
    </div>
</body>
</html>
