<!DOCTYPE html>
<html lang="fr" class="h-full bg-slate-900 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Astreintes - DSI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Effet de survol sur tout un bloc (Semaine ou Week-end) */
        .hover-block:hover .day-cell { background-color: rgba(99, 102, 241, 0.2); cursor: pointer; }
        .selected-block .day-cell { background-color: rgba(79, 70, 229, 0.4); border-color: rgba(99, 102, 241, 0.6); }
        .taken-block .day-cell { background-color: rgba(225, 29, 72, 0.15); border-color: rgba(225, 29, 72, 0.3); cursor: not-allowed; }
        .pending-block .day-cell { background-color: rgba(245, 158, 11, 0.15); border-color: rgba(245, 158, 11, 0.3); }
    </style>
</head>
<body class="h-full flex flex-col font-sans">

    <header class="flex items-center justify-between border-b border-slate-800 bg-slate-950 px-6 py-4">
        <h1 class="text-xl font-bold tracking-tight text-indigo-400">Calendrier des Astreintes</h1>
        <div class="flex items-center gap-4">
            <span class="text-sm font-bold bg-slate-800 px-3 py-1 rounded text-slate-300" id="display-tag"></span>
            <span class="text-sm text-slate-400" id="display-name">...</span>
            <a href="#" onclick="logout()" class="text-sm text-rose-400 hover:text-rose-300 underline decoration-rose-400/30 underline-offset-4 ml-4">Déconnexion</a>
        </div>
    </header>

    <main class="flex-1 p-8 max-w-7xl mx-auto w-full">
        
        <div class="flex justify-between items-end mb-6">
            <div>
                <h2 id="month-label" class="text-2xl font-bold capitalize text-slate-100">...</h2>
                <p class="text-sm text-slate-400 mt-1">Sélectionnez les blocs (Semaine ou Week-end) où vous êtes disponible.</p>
            </div>
            <div class="flex gap-2">
                <button onclick="changeMonth(-1)" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition font-medium">&larr; Précédent</button>
                <button onclick="changeMonth(1)" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg transition font-medium">Suivant &rarr;</button>
            </div>
        </div>

        <!-- Légende -->
        <div class="flex gap-6 mb-4 text-sm font-medium border-b border-slate-800 pb-4">
            <div class="flex items-center gap-2"><div class="w-4 h-4 rounded bg-indigo-600/40 border border-indigo-500"></div> Ma sélection</div>
            <div class="flex items-center gap-2"><div class="w-4 h-4 rounded bg-amber-500/20 border border-amber-500/50"></div> Ma demande en attente</div>
            <div class="flex items-center gap-2"><div class="w-4 h-4 rounded bg-rose-500/20 border border-rose-500/50"></div> Bloc attribué</div>
        </div>

        <!-- En-têtes des jours -->
        <div class="grid grid-cols-7 gap-2 mb-2 text-center font-bold text-slate-400 text-sm">
            <div>Lundi</div><div>Mardi</div><div>Mercredi</div><div>Jeudi</div><div>Vendredi</div>
            <div class="text-indigo-300">Samedi</div><div class="text-indigo-300">Dimanche</div>
        </div>

        <!-- Grille du calendrier -->
        <div id="calendar-grid" class="flex flex-col gap-2"></div>

        <div class="mt-8 flex justify-between items-center bg-slate-950 p-6 rounded-xl border border-slate-800 shadow-xl">
            <div>
                <h3 class="font-bold text-lg text-slate-200">Panier de disponibilités</h3>
                <p id="selection-count" class="text-sm text-slate-400 mt-1">0 bloc(s) sélectionné(s)</p>
            </div>
            <div class="flex items-center gap-4">
                <span id="submit-msg" class="text-sm font-medium hidden"></span>
                <button id="btn-submit" onclick="submitRequests()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-8 rounded-lg transition shadow-md shadow-indigo-500/20 disabled:opacity-50 disabled:cursor-not-allowed">
                    Soumettre mes demandes
                </button>
            </div>
        </div>
    </main>

    <script>
        // Sécurité & Session
        const sessionId = localStorage.getItem('session_email');
        const sessionName = localStorage.getItem('session_name');
        const sessionTag = localStorage.getItem('session_tag');
        const serviceId = localStorage.getItem('session_service');
        
        if (!sessionId || localStorage.getItem('session_role') !== 'User') {
            window.location.replace('/login.html');
        }

        document.getElementById('display-name').innerText = sessionName;
        document.getElementById('display-tag').innerText = sessionTag;

        function logout() { localStorage.clear(); window.location.replace('/login.html'); }

        // Variables d'état
        let currentDate = new Date(); // Date affichée
        currentDate.setDate(1); // On se place toujours au 1er du mois
        let shiftsData = [];
        let selectedBlocks = new Set(); // Stocke des chaînes JSON (ex: '{"type":"Semaine","date":"2026-07-20"}')

        // Formatage YYYY-MM-DD
        function toISODate(date) {
            return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
        }

        // Récupérer les astreintes depuis l'API
        async function fetchShifts() {
            try {
                const res = await fetch(`/api/shifts/${serviceId}`);
                if (res.ok) shiftsData = await res.json();
            } catch (err) { console.error(err); }
        }

        // Construire la grille du mois
        async function renderCalendar() {
            await fetchShifts();
            
            const monthStr = currentDate.toLocaleString('fr-FR', { month: 'long', year: 'numeric' });
            document.getElementById('month-label').innerText = monthStr;
            
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            // Calcul du premier jour à afficher (le Lundi de la première semaine)
            let firstDayOfMonth = new Date(year, month, 1);
            let startOffset = firstDayOfMonth.getDay() - 1; // 0=Lun, 6=Dim
            if (startOffset < 0) startOffset = 6;
            
            let drawDate = new Date(year, month, 1 - startOffset);

            // Génération de 5 ou 6 semaines
            for (let week = 0; week < 6; week++) {
                const weekRow = document.createElement('div');
                weekRow.className = 'grid grid-cols-7 gap-2';

                // On identifie les dates d'ancrage de la semaine
                const mondayDate = new Date(drawDate);
                const saturdayDate = new Date(drawDate);
                saturdayDate.setDate(mondayDate.getDate() + 5);

                const mondayStr = toISODate(mondayDate);
                const saturdayStr = toISODate(saturdayDate);

                // Analyse de l'état des blocs via la BDD
                let weekState = checkBlockState('Semaine', mondayStr);
                let weekendState = checkBlockState('Weekend', saturdayStr);

                // --- DOM BLOC SEMAINE (Lundi à Vendredi) ---
                const weekWrapper = document.createElement('div');
                weekWrapper.className = `col-span-5 grid grid-cols-5 gap-2 rounded-lg p-1 transition ${getStateClass(weekState, 'Semaine', mondayStr)}`;
                // Si le bloc est libre ou en attente, on peut cliquer
                if (weekState.status !== 'Validée') {
                    weekWrapper.classList.add('hover-block');
                    weekWrapper.onclick = () => toggleSelection('Semaine', mondayStr);
                }

                for (let d = 0; d < 5; d++) {
                    weekWrapper.appendChild(createDayCell(drawDate, month, weekState));
                    drawDate.setDate(drawDate.getDate() + 1);
                }

                // --- DOM BLOC WEEKEND (Samedi et Dimanche) ---
                const weekendWrapper = document.createElement('div');
                weekendWrapper.className = `col-span-2 grid grid-cols-2 gap-2 rounded-lg p-1 transition ${getStateClass(weekendState, 'Weekend', saturdayStr)}`;
                if (weekendState.status !== 'Validée') {
                    weekendWrapper.classList.add('hover-block');
                    weekendWrapper.onclick = () => toggleSelection('Weekend', saturdayStr);
                }

                for (let d = 0; d < 2; d++) {
                    weekendWrapper.appendChild(createDayCell(drawDate, month, weekendState));
                    drawDate.setDate(drawDate.getDate() + 1);
                }

                weekRow.appendChild(weekWrapper);
                weekRow.appendChild(weekendWrapper);
                grid.appendChild(weekRow);

                // Si on a dépassé la fin du mois, on arrête de dessiner des semaines
                if (drawDate.getMonth() !== month && week >= 4) break; 
            }
            updateSelectionUI();
        }

       

        // Gérer les classes CSS en fonction de l'état
        function getStateClass(state, type, dateStr) {
            if (state.status === 'Validée') return 'taken-block border border-rose-900/30';
            if (state.status === 'En attente' && state.isMine) return 'pending-block border border-amber-900/30';
            
            // Vérifier si c'est sélectionné par l'utilisateur (Panier)
            const id = JSON.stringify({ period_type: type, start_date: dateStr });
            if (selectedBlocks.has(id)) return 'selected-block border border-indigo-500/50';
            
            return 'border border-transparent';
        }

        // Ajouter/Retirer du panier
        function toggleSelection(type, dateStr) {
            const id = JSON.stringify({ period_type: type, start_date: dateStr });
            if (selectedBlocks.has(id)) {
                selectedBlocks.delete(id);
            } else {
                selectedBlocks.add(id);
            }
            renderCalendar(); // Redessine pour appliquer les couleurs
        }

        function updateSelectionUI() {
            document.getElementById('selection-count').innerText = `${selectedBlocks.size} bloc(s) sélectionné(s)`;
            document.getElementById('btn-submit').disabled = selectedBlocks.size === 0;
        }

        function changeMonth(offset) {
            currentDate.setMonth(currentDate.getMonth() + offset);
            renderCalendar();
        }

        // Envoi des requêtes au serveur
        async function submitRequests() {
            const btn = document.getElementById('btn-submit');
            const msg = document.getElementById('submit-msg');
            btn.disabled = true;
            msg.classList.remove('hidden');
            msg.className = "text-sm font-medium text-slate-400 hidden block";
            msg.innerText = "Envoi en cours...";

            // On boucle sur le panier et on envoie chaque requête (exécuté en parallèle via Promise.all)
            const requests = Array.from(selectedBlocks).map(idStr => {
                const block = JSON.parse(idStr);
                return fetch('/api/shifts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: parseInt(localStorage.getItem('session_userId') || 0), // Attention on doit avoir le user_id !
                        service_id: parseInt(serviceId),
                        period_type: block.period_type,
                        start_date: block.start_date
                    })
                });
            });

            // Gérer le user_id manquant de notre session précédente : on va le récupérer via l'API plus tard, 
            // ou on peut faire confiance à l'email en backend. Pour l'instant, on suppose que l'API lit l'ID.
            // *Note: Dans notre code backend user.rs, create_shift_request attend un user_id.*
            // Il faut s'assurer que login_user sauvegarde le user_id.

            try {
                await Promise.all(requests);
                msg.className = "text-sm font-medium text-emerald-400 block";
                msg.innerText = "Demandes envoyées au manager !";
                selectedBlocks.clear();
                setTimeout(() => { msg.classList.add('hidden'); renderCalendar(); }, 1500);
            } catch (err) {
                msg.className = "text-sm font-medium text-rose-400 block";
                msg.innerText = "Erreur lors de l'envoi.";
                btn.disabled = false;
            }
        }

        // Extrait les initiales (ex: "Jans Guillopé" -> "JG")
        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        }

        // Vérifie la BDD pour un bloc précis (Correction de priorité)
        function checkBlockState(type, dateStr) {
            // 1. PRIORITÉ MAXIMALE : On cherche si le bloc est validé (pour moi ou un collègue)
            const validated = shiftsData.find(s => s.period_type === type && s.start_date === dateStr && s.status === 'Validée');
            if (validated) {
                return { status: 'Validée', color: validated.user_tag, name: validated.user_name, isMine: validated.user_tag === sessionTag };
            }
            
            // 2. Sinon, on cherche si J'AI une demande en attente
            const myPending = shiftsData.find(s => s.period_type === type && s.start_date === dateStr && s.status === 'En attente' && s.user_tag === sessionTag);
            if (myPending) {
                return { status: 'En attente', isMine: true };
            }
            
            // 3. Sinon, le bloc est totalement libre
            return { status: 'Libre' };
        }

        // Créer une petite case de jour
        function createDayCell(dateObj, targetMonth, blockState) {
            const div = document.createElement('div');
            const isCurrentMonth = dateObj.getMonth() === targetMonth;
            
            div.className = `day-cell relative h-16 rounded-md border border-slate-800 flex flex-col items-center justify-center transition-colors ${isCurrentMonth ? 'bg-slate-900' : 'bg-slate-950/50 text-slate-600'}`;
            
            div.innerHTML = `<span class="text-lg font-bold">${dateObj.getDate()}</span>`;
            
            // Si le bloc est validé, on injecte la couleur Hex en background (style="") et on écrit les initiales en foncé par-dessus
            if (blockState.status === 'Validée') {
                const initials = getInitials(blockState.name);
                div.innerHTML += `<span class="absolute bottom-1 text-[10px] font-bold text-slate-900 px-1.5 rounded" style="background-color: ${blockState.color};">${initials}</span>`;
            } else if (blockState.status === 'En attente' && blockState.isMine) {
                div.innerHTML += `<span class="absolute bottom-1 text-[10px] font-bold text-amber-400">En attente</span>`;
            }

            return div;
        }

        // INIT
        renderCalendar();

    </script>
</body>
</html>
