<!DOCTYPE html>
<html lang="fr" class="h-full bg-slate-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sécurité - Astreintes DSI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center font-sans">
    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl shadow-xl p-8">
        <div class="mb-8 text-center">
            <h2 class="text-2xl font-bold text-slate-100">Action requise</h2>
            <p class="text-sm text-slate-400 mt-2">Veuillez personnaliser votre mot de passe pour sécuriser votre compte.</p>
        </div>

        <form id="form-change-pwd" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">Nouveau mot de passe</label>
                <input type="password" id="new-password" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">Confirmer le mot de passe</label>
                <input type="password" id="confirm-password" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-200 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition">
            </div>

            <div id="msg" class="text-sm font-medium hidden text-center mt-4"></div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-lg transition shadow-md shadow-indigo-500/20 mt-6">
                Valider et se reconnecter
            </button>
        </form>
    </div>

    <script>
        const tempEmail = localStorage.getItem('temp_email');
        const tempPassword = localStorage.getItem('temp_password');

        if (!tempEmail || !tempPassword) {
            window.location.replace('/login.html');
        }

        document.getElementById('form-change-pwd').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const msgDiv = document.getElementById('msg');
            
            msgDiv.classList.remove('hidden');

            if (newPassword !== confirmPassword) {
                msgDiv.className = "text-sm font-medium text-rose-400 text-center mt-4";
                msgDiv.innerText = "Les mots de passe ne correspondent pas.";
                return;
            }

            msgDiv.className = "text-sm font-medium text-slate-400 text-center mt-4";
            msgDiv.innerText = "Chiffrement et mise à jour...";

            try {
                const response = await fetch('/api/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: tempEmail,
                        old_password: tempPassword,
                        new_password: newPassword
                    })
                });

                if (response.ok) {
                    msgDiv.className = "text-sm font-medium text-emerald-400 text-center mt-4";
                    msgDiv.innerText = "Mot de passe sécurisé ! Redirection...";
                    
                    // On vide les identifiants temporaires
                    localStorage.removeItem('temp_email');
                    localStorage.removeItem('temp_password');
                    
                    // On renvoie vers le login pour déclencher le routage intelligent (Admin/Manager/User)
                    setTimeout(() => { window.location.replace('/login.html'); }, 1500);
                } else {
                    const errorText = await response.text();
                    msgDiv.className = "text-sm font-medium text-rose-400 text-center mt-4";
                    msgDiv.innerText = "Erreur : " + errorText;
                }
            } catch (error) {
                msgDiv.className = "text-sm font-medium text-rose-400 text-center mt-4";
                msgDiv.innerText = "Erreur de communication avec le serveur.";
            }
        });
    </script>
</body>
</html>
